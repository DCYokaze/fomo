services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: monitor
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d monitor"]
      interval: 3s
      retries: 10

  api:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --reload
    volumes:
      - ./main.py:/app/main.py
      - ./static:/app/static
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://dev:dev@db:5432/monitor
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:

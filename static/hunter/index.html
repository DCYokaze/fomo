<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hunter Dashboard</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --s1: #161616;
    --s2: #1f1f1f;
    --s3: #2a2a2a;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --accent: #f0ff40;
    --accent-dim: rgba(240,255,64,0.1);
    --green: #00e87a;
    --green-dim: rgba(0,232,122,0.1);
    --red: #ff4d6a;
    --red-dim: rgba(255,77,106,0.1);
    --blue: #4d9fff;
    --text: #efefef;
    --muted: rgba(239,239,239,0.45);
    --dim: rgba(239,239,239,0.22);
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

  header {
    background: var(--s1);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo { font-family: var(--mono); font-size: 13px; letter-spacing: 0.15em; color: var(--accent); }
  .role-badge {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em;
    padding: 4px 10px; border-radius: 4px;
    background: var(--accent-dim); color: var(--accent);
    border: 1px solid rgba(240,255,64,0.25);
  }

  .layout { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 57px); }

  /* SIDEBAR */
  .sidebar {
    background: var(--s1); border-right: 1px solid var(--border);
    padding: 1.5rem 1rem;
    display: flex; flex-direction: column; gap: 0.5rem;
  }
  .nav-label {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em;
    color: var(--dim); padding: 0 0.75rem; margin: 1rem 0 0.25rem;
    text-transform: uppercase;
  }
  .nav-btn {
    width: 100%; text-align: left; padding: 0.75rem 0.9rem;
    border-radius: 8px; border: none; background: transparent;
    color: var(--muted); font-family: var(--sans); font-size: 14px;
    cursor: pointer; display: flex; align-items: center; gap: 10px;
    transition: all 0.15s;
  }
  .nav-btn:hover { background: var(--s2); color: var(--text); }
  .nav-btn.active { background: var(--accent-dim); color: var(--accent); }
  .nav-icon { font-size: 16px; width: 20px; text-align: center; }

  .hunter-id-box {
    margin-top: auto;
    padding: 1rem;
    background: var(--s2); border-radius: 10px; border: 1px solid var(--border);
  }
  .hunter-id-label { font-family: var(--mono); font-size: 9px; color: var(--dim); letter-spacing: 0.1em; margin-bottom: 6px; }
  .hunter-id-input {
    width: 100%; background: var(--s3); border: 1px solid var(--border2);
    border-radius: 6px; padding: 7px 10px; color: var(--text);
    font-family: var(--mono); font-size: 12px; outline: none;
  }
  .hunter-id-input:focus { border-color: var(--accent); }

  /* MAIN */
  .main { padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; }

  .page-title { font-size: 22px; font-weight: 300; letter-spacing: -0.02em; }
  .page-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

  /* STATS ROW */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
  .stat { background: var(--s1); padding: 1.25rem 1.5rem; }
  .stat-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.15em; color: var(--dim); text-transform: uppercase; margin-bottom: 8px; }
  .stat-value { font-family: var(--mono); font-size: 22px; font-weight: 600; color: var(--text); }
  .stat-value.accent { color: var(--accent); }
  .stat-value.green { color: var(--green); }

  /* JOBS LIST */
  .jobs-header {
    display: flex; align-items: center; justify-content: space-between;
  }
  .section-title { font-family: var(--mono); font-size: 11px; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; }
  .refresh-btn {
    padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border2);
    background: transparent; color: var(--muted); font-family: var(--mono);
    font-size: 11px; cursor: pointer; transition: all 0.15s; letter-spacing: 0.05em;
  }
  .refresh-btn:hover { background: var(--s2); color: var(--text); }

  .job-card {
    background: var(--s1); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.25rem 1.5rem;
    display: grid; grid-template-columns: 1fr auto;
    gap: 1rem; align-items: start;
    transition: border-color 0.2s;
    animation: fade-in 0.25s ease-out;
  }
  .job-card:hover { border-color: var(--border2); }
  @keyframes fade-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .job-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .job-game {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em;
    padding: 3px 8px; border-radius: 4px;
    background: var(--accent-dim); color: var(--accent);
    border: 1px solid rgba(240,255,64,0.2);
  }
  .job-status-badge {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em;
    padding: 3px 8px; border-radius: 4px;
  }
  .badge-open { background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,232,122,0.2); }
  .badge-active { background: rgba(77,159,255,0.1); color: var(--blue); border: 1px solid rgba(77,159,255,0.2); }
  .badge-completed { background: var(--s2); color: var(--muted); border: 1px solid var(--border); }

  .job-payer { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
  .job-note { font-size: 13px; color: var(--muted); }
  .job-meta { font-family: var(--mono); font-size: 10px; color: var(--dim); margin-top: 8px; }

  .online-pill {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 10px;
  }
  .online-dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot-active { background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 2s ease-in-out infinite; }
  .dot-offline { background: var(--red); }
  .dot-unknown { background: var(--s3); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .job-actions { display: flex; flex-direction: column; gap: 0.5rem; align-items: flex-end; }
  .btn-accept {
    padding: 8px 18px; border-radius: 8px;
    border: 1px solid rgba(0,232,122,0.35);
    background: var(--green-dim); color: var(--green);
    font-family: var(--sans); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .btn-accept:hover { background: rgba(0,232,122,0.2); }
  .btn-accept:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-complete {
    padding: 8px 18px; border-radius: 8px;
    border: 1px solid rgba(77,159,255,0.35);
    background: rgba(77,159,255,0.1); color: var(--blue);
    font-family: var(--sans); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
  }
  .btn-complete:hover { background: rgba(77,159,255,0.2); }

  .progress-tag {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.12em;
    padding: 2px 7px; border-radius: 4px;
  }
  .progress-queued {
    background: rgba(77,159,255,0.12); color: var(--blue);
    border: 1px solid rgba(77,159,255,0.25);
  }
  .progress-in_progress {
    background: var(--accent-dim); color: var(--accent);
    border: 1px solid rgba(240,255,64,0.25);
    animation: blink 1.5s ease-in-out infinite;
  }
  .job-card.in_progress {
    border-color: rgba(240,255,64,0.3);
    box-shadow: 0 0 0 1px rgba(240,255,64,0.1);
  }
  .btn-progress-queued {
    padding: 8px 18px; border-radius: 8px;
    border: 1px solid rgba(240,255,64,0.35);
    background: var(--accent-dim); color: var(--accent);
    font-family: var(--sans); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .btn-progress-queued:hover { background: rgba(240,255,64,0.2); }
  .btn-progress-in_progress {
    padding: 8px 18px; border-radius: 8px;
    border: 1px solid rgba(77,159,255,0.35);
    background: rgba(77,159,255,0.1); color: var(--blue);
    font-family: var(--sans); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .btn-progress-in_progress:hover { background: rgba(77,159,255,0.2); }

  .empty-state {
    text-align: center; padding: 4rem 2rem;
    font-family: var(--mono); font-size: 12px; color: var(--dim); letter-spacing: 0.1em;
  }

  .toast {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(16px);
    background: var(--s2); border: 1px solid var(--border2);
    border-radius: 8px; padding: 10px 20px;
    font-family: var(--mono); font-size: 12px; color: var(--muted);
    opacity: 0; transition: all 0.3s; z-index: 999; white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .loading-row { display: flex; align-items: center; gap: 10px; padding: 2rem; color: var(--dim); font-family: var(--mono); font-size: 12px; }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ─── Config ───────────────────────────────────────────────────────────────────
const API_BASE = ""; // change to Cloud Run URL
const HUNTER_KEY = "hunter-key-1";       // change to real key

const api = (path, opts = {}) =>
  fetch(`${API_BASE}${path}`, {
    ...opts,
    headers: { "x-api-key": HUNTER_KEY, "Content-Type": "application/json", ...opts.headers },
  }).then(r => r.json());

// ─── Helpers ──────────────────────────────────────────────────────────────────
function timeAgo(ts) {
  if (!ts) return "—";
  const s = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (s < 60) return s + "s ago";
  if (s < 3600) return Math.floor(s / 60) + "m ago";
  return Math.floor(s / 3600) + "h ago";
}

function OnlinePill({ status }) {
  const cls = status === "active" ? "dot-active" : status === "offline" ? "dot-offline" : "dot-unknown";
  const label = status === "active" ? "Online" : status === "offline" ? "Offline" : "Unknown";
  return (
    <div className="online-pill">
      <div className={`online-dot ${cls}`} />
      <span style={{ color: status === "active" ? "var(--green)" : "var(--dim)" }}>{label}</span>
    </div>
  );
}

function StatusBadge({ status }) {
  const map = { open: "badge-open", active: "badge-active", completed: "badge-completed" };
  return <span className={`job-status-badge ${map[status] || "badge-completed"}`}>{status}</span>;
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function useToast() {
  const [msg, setMsg] = useState("");
  const [show, setShow] = useState(false);
  const t = useRef();
  const toast = (m) => {
    setMsg(m); setShow(true);
    clearTimeout(t.current);
    t.current = setTimeout(() => setShow(false), 2500);
  };
  return { msg, show, toast };
}

// ─── Job Card ─────────────────────────────────────────────────────────────────
const PROGRESS_LABELS = {
  queued:      "In Queue",
  in_progress: "In Progress",
};

function ProgressTag({ progress }) {
  if (!progress) return null;
  const label = PROGRESS_LABELS[progress] || progress;
  const prefix = progress === "in_progress" ? "● " : "◌ ";
  return <span className={`progress-tag progress-${progress}`}>{prefix}{label.toUpperCase()}</span>;
}

function JobCard({ job, hunterId, onAccept, onComplete, onSetProgress }) {
  const [loading, setLoading] = useState(false);

  const handleAccept = async () => {
    if (!hunterId.trim()) return alert("Set your Hunter ID first");
    setLoading(true);
    await onAccept(job.id);
    setLoading(false);
  };

  const handleComplete = async () => {
    setLoading(true);
    await onComplete(job.id);
    setLoading(false);
  };

  const handleSetProgress = async (progress) => {
    setLoading(true);
    await onSetProgress(job.id, progress);
    setLoading(false);
  };

  const isMyActive = job.status === "active" && job.hunter_id === hunterId;
  const cardClass = isMyActive && job.progress === "in_progress" ? "in_progress" : "";

  return (
    <div className={`job-card ${cardClass}`}>
      <div>
        <div className="job-top">
          <span className="job-game">{job.game}</span>
          <StatusBadge status={job.status} />
          {isMyActive && job.progress && <ProgressTag progress={job.progress} />}
        </div>
        <div className="job-payer">{job.payer_name}</div>
        {job.note && <div className="job-note">{job.note}</div>}
        <div className="job-meta">
          Account: {job.account_id} · Posted {timeAgo(job.created_at)}
          {job.accepted_at && ` · Accepted ${timeAgo(job.accepted_at)}`}
        </div>
      </div>
      <div className="job-actions">
        <OnlinePill status={job.online_status} />
        {job.status === "open" && (
          <button className="btn-accept" onClick={handleAccept} disabled={loading}>
            {loading ? "..." : "Accept"}
          </button>
        )}
        {isMyActive && job.progress === "queued" && (
          <button className="btn-progress-queued" onClick={() => handleSetProgress("in_progress")} disabled={loading}>
            {loading ? "..." : "▶ Start Working"}
          </button>
        )}
        {isMyActive && job.progress === "in_progress" && (
          <button className="btn-progress-in_progress" onClick={() => handleSetProgress("queued")} disabled={loading}>
            {loading ? "..." : "⏸ Back to Queue"}
          </button>
        )}
        {isMyActive && (
          <button className="btn-complete" onClick={handleComplete} disabled={loading}>
            {loading ? "..." : "Complete"}
          </button>
        )}
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("open");
  const [hunterId, setHunterId] = useState("hunter_001");
  const [openJobs, setOpenJobs] = useState([]);
  const [myJobs, setMyJobs] = useState([]);
  const [loading, setLoading] = useState(false);
  const { msg, show, toast } = useToast();

  const loadOpen = useCallback(async () => {
    setLoading(true);
    try {
      const data = await api("/hunter/jobs");
      setOpenJobs(data.jobs || []);
    } catch { toast("Failed to load jobs"); }
    setLoading(false);
  }, []);

  const loadMine = useCallback(async () => {
    if (!hunterId.trim()) return;
    setLoading(true);
    try {
      const data = await api(`/hunter/my-jobs/${hunterId}`);
      setMyJobs(data.jobs || []);
    } catch { toast("Failed to load your jobs"); }
    setLoading(false);
  }, [hunterId]);

  useEffect(() => { loadOpen(); }, []);
  useEffect(() => { if (tab === "mine") loadMine(); }, [tab]);

  const handleAccept = async (jobId) => {
    try {
      await api(`/hunter/jobs/${jobId}/accept`, {
        method: "POST",
        body: JSON.stringify({ hunter_id: hunterId }),
      });
      toast("Job accepted!");
      loadOpen(); loadMine();
    } catch { toast("Failed to accept job"); }
  };

  const handleComplete = async (jobId) => {
    try {
      await api(`/hunter/jobs/${jobId}/complete`, { method: "POST" });
      toast("Job marked complete!");
      loadMine();
    } catch { toast("Failed to complete job"); }
  };

  const handleSetProgress = async (jobId, progress) => {
    try {
      await api(`/hunter/jobs/${jobId}/progress`, {
        method: "POST",
        body: JSON.stringify({ progress }),
      });
      toast(progress === "in_progress" ? "Marked as In Progress!" : "Back to In Queue");
      if (tab === "open") loadOpen(); else loadMine();
    } catch { toast("Failed to update progress"); }
  };

  const completedCount = myJobs.filter(j => j.status === "completed").length;
  const activeCount = myJobs.filter(j => j.status === "active").length;

  return (
    <>
      <header>
        <div className="logo">GAME·MONITOR</div>
        <div className="role-badge">HUNTER</div>
      </header>

      <div className="layout">
        <aside className="sidebar">
          <div className="nav-label">Menu</div>
          <button className={`nav-btn ${tab === "open" ? "active" : ""}`} onClick={() => { setTab("open"); loadOpen(); }}>
            <span className="nav-icon">◈</span> Open Jobs
          </button>
          <button className={`nav-btn ${tab === "mine" ? "active" : ""}`} onClick={() => setTab("mine")}>
            <span className="nav-icon">◉</span> My Jobs
          </button>

          <div className="hunter-id-box">
            <div className="hunter-id-label">YOUR HUNTER ID</div>
            <input
              className="hunter-id-input"
              value={hunterId}
              onChange={e => setHunterId(e.target.value)}
              placeholder="hunter_001"
            />
          </div>
        </aside>

        <main className="main">
          {tab === "open" && (
            <>
              <div>
                <div className="page-title">Open Jobs</div>
                <div className="page-sub">Available accounts waiting for a hunter</div>
              </div>

              <div className="stats-row">
                <div className="stat">
                  <div className="stat-label">Available</div>
                  <div className="stat-value accent">{openJobs.length}</div>
                </div>
                <div className="stat">
                  <div className="stat-label">Online now</div>
                  <div className="stat-value green">{openJobs.filter(j => j.online_status === "active").length}</div>
                </div>
                <div className="stat">
                  <div className="stat-label">My active</div>
                  <div className="stat-value">{activeCount}</div>
                </div>
                <div className="stat">
                  <div className="stat-label">Completed</div>
                  <div className="stat-value">{completedCount}</div>
                </div>
              </div>

              <div className="jobs-header">
                <span className="section-title">Job listings</span>
                <button className="refresh-btn" onClick={loadOpen}>↻ Refresh</button>
              </div>

              {loading
                ? <div className="loading-row"><div className="spinner" /> Loading jobs...</div>
                : openJobs.length === 0
                  ? <div className="empty-state">NO OPEN JOBS RIGHT NOW</div>
                  : openJobs.map(j => (
                      <JobCard key={j.id} job={j} hunterId={hunterId}
                        onAccept={handleAccept} onComplete={handleComplete} onSetProgress={handleSetProgress} />
                    ))
              }
            </>
          )}

          {tab === "mine" && (
            <>
              <div>
                <div className="page-title">My Jobs</div>
                <div className="page-sub">Jobs you have accepted or completed</div>
              </div>

              <div className="jobs-header">
                <span className="section-title">Your history</span>
                <button className="refresh-btn" onClick={loadMine}>↻ Refresh</button>
              </div>

              {loading
                ? <div className="loading-row"><div className="spinner" /> Loading...</div>
                : myJobs.length === 0
                  ? <div className="empty-state">NO JOBS YET — ACCEPT ONE FIRST</div>
                  : myJobs.map(j => (
                      <JobCard key={j.id} job={j} hunterId={hunterId}
                        onAccept={handleAccept} onComplete={handleComplete} onSetProgress={handleSetProgress} />
                    ))
              }
            </>
          )}
        </main>
      </div>

      <div className={`toast ${show ? "show" : ""}`}>{msg}</div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
